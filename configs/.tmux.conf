set-option -g history-limit 25000
set -g mouse on

# Disable right-click menu, allow terminal paste
unbind -n MouseDown3Pane
unbind -T root MouseDown3Pane

# Status bar styling
set -g status-style "bg=black,fg=white"
set -g status-left-style "bg=black,fg=white"
set -g status-right-style "bg=black,fg=white"
set -g status-right-length 100
set -g status-left-length 20

# Status bar content
set -g status-right ' CPU: #{cpu_percentage} | RAM: #(free | awk "NR==2{printf \"%.0f%%\", \$3*100/\$2}") | Load: #(uptime | awk -F"load average:" "{print \$2}") | Up: #(awk "{print int(\$1/86400)}d" /proc/uptime) | %a %h-%d %H:%M '

# CPU plugin colors
set -g @cpu_low_fg_color "#[fg=white]"
set -g @cpu_medium_fg_color "#[fg=white]" 
set -g @cpu_high_fg_color "#[fg=white]"
set -g @cpu_low_bg_color "#[bg=black]"
set -g @cpu_medium_bg_color "#[bg=black]"
set -g @cpu_high_bg_color "#[bg=black]"
#set -g status-position top
set -g status-interval 5
##set -g status-left ""

# rename panes to current working directory
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'

set-option -g set-clipboard on



# Открыть новое окно двойным щелчком на строке состояния
#bind-key -n DoubleClick1Status new-window

# disable status
# set -g status off
 set -g status on

# count the panes from 1
set -g base-index 1
setw -g pane-base-index 1

# reload configuration
bind-key -r r source-file ~/.tmux.conf

# Vim-style navigation between panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Vim-style copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -r y send-keys -X copy-selection-and-cancel

# Activity notifications
setw -g monitor-activity on
set -g visual-activity on
set -g activity-action other

# Pane styling
set -g pane-border-style "fg=#404040"
set -g pane-active-border-style "fg=#00ff00"
set -g window-active-style "bg=black"
set -g window-style "bg=#1a1a1a"

# Quick pane splitting
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Fast window switching
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# Session management
bind S command-prompt -p "New Session:" "new-session -A -s '%%'"
bind K confirm kill-session

# Clear screen and scrollback
bind C-l send-keys 'C-l'

# term colors, these are the correct ones according to neovim checkhealth
set -g default-terminal "tmux-256color"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @plugin 'tmux-plugins/tmux-sidebar'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# tmux-resurrect settings
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'

# tmux-continuum settings
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'



# Initialize TPM
run '~/.tmux/plugins/tpm/tpm'
